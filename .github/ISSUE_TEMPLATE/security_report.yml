name: Security report
description: Report a security concern without disclosing exploit details publicly.
title: 'security: '
labels: [security]
body:
  - type: markdown
    attributes:
      value: |
        Do not publish secrets, exploit code, or sensitive attack details in this issue.
        If the report contains a real vulnerability, use the private process described in SECURITY.md.
  - type: textarea
    id: component
    attributes:
      label: Affected component
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Security impact
    validations:
      required: true
  - type: textarea
    id: mitigation
    attributes:
      label: Suggested mitigation
