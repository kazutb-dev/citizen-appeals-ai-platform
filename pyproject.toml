[tool.black]
line-length = 100
target-version = ["py311", "py312"]
include = "backend/.*\\.pyi?$"

[tool.isort]
profile = "black"
line_length = 100
src_paths = ["backend"]
known_first_party = ["app"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["backups", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "ASYNC"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
