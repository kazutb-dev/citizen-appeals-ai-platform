# Dev-режим: hot-reload backend и worker, фронтенд запускается локально (npm run dev).
# Запуск: docker compose -f docker-compose.yml -f docker-compose.dev.yml up postgres redis backend worker
version: '3.9'

services:
  postgres:
    ports:
      - '5432:5432'

  redis:
    ports:
      - '6379:6379'

  backend:
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    ports:
      - '8000:8000'

  worker:
    command: arq app.worker.WorkerSettings --watch app
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
