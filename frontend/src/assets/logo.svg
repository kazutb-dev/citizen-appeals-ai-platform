<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="mhq-bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F6CBD"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="mhq-pulse" x1="0" y1="0" x2="28" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="11" fill="url(#mhq-bg)"/>
  <!-- Medical cross — vertical -->
  <rect x="20.5" y="10" width="7" height="28" rx="3.5" fill="white" opacity="0.95"/>
  <!-- Medical cross — horizontal -->
  <rect x="10" y="20.5" width="28" height="7" rx="3.5" fill="white" opacity="0.95"/>
  <!-- Small heartbeat line accent at bottom right -->
  <polyline
    points="30,38  32.5,33  34.5,41  36.5,35.5  38,38"
    stroke="white"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.7"
  />
</svg>
