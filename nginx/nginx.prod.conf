# Продакшен-конфигурация MedHubHAQ: HTTPS.
# Сертификаты монтируются в контейнер из ./ssl.

server {
    listen 80;
    server_name medhubhaq.kz;

    # Всё на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name medhubhaq.kz;

    ssl_certificate     /ssl/fullchain.pem;
    ssl_certificate_key /ssl/private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    client_max_body_size 50m;

    # Docker internal DNS resolver — позволяет nginx стартовать до backend
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream "http://ncaip_backend:8000";
    set $frontend_upstream "http://ncaip_frontend:80";

    # API → backend (включая SSE для /api/lab/stream — buffering off ниже)
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Health check
    location /health {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Frontend — React/Vite SPA (статика через nginx контейнера frontend)
    location / {
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
